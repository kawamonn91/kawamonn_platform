{% extends "base.html" %}

{% block content %}
<div class="glass-container">
    <div class="login-box">
        <h2>Login</h2>
        <form method="POST" action="">
            {{ form.hidden_tag() }}
            <div class="user-box">
                {{ form.email(placeholder="Email or Username", autocomplete="off") }}
            </div>
            <div class="user-box">
                {{ form.password(placeholder="Password", autocomplete="off") }}
            </div>

            <div class="actions">
                {{ form.submit(class="btn-submit") }}
            </div>

            <div class="links">
                <a href="https://register.kawamonn.com">Create Account</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
