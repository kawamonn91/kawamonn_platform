{% extends "base.html" %}

{% block content %}
<div class="login-wrapper" style="display: flex; justify-content: center; align-items: center; height: 80vh;">
    <div class="login-box"
        style="width: 400px; padding: 40px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1);">
        <h2 style="text-align: center; margin-bottom: 30px;">Two-Factor Authentication</h2>
        <p style="text-align: center; margin-bottom: 20px; font-size: 14px;">Please enter the verification code sent to
            your email.</p>
        <form method="POST" action="">
            <div class="user-box" style="margin-bottom: 30px;">
                <input type="text" name="otp" placeholder="Enter 6-digit Code" required autocomplete="off"
                    style="width: 100%; padding: 10px; background: transparent; border: none; border-bottom: 1px solid white; color: white; text-align: center; font-size: 24px; letter-spacing: 5px;">
            </div>

            <button type="submit" class="btn-submit"
                style="width: 100%; padding: 10px; background: var(--accent-color); border: none; border-radius: 5px; cursor: pointer; color: black; font-weight: bold;">Verify</button>
        </form>
    </div>
</div>
{% endblock %}
