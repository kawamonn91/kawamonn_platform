{% extends "base.html" %}

{% block content %}
<div class="login-wrapper" style="display: flex; justify-content: center; align-items: center; height: 80vh;">
    <div class="login-box"
        style="width: 400px; padding: 40px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1);">
        <h2 style="text-align: center; margin-bottom: 30px;">Admin Login</h2>
        <form method="POST" action="">
            <div class="user-box" style="margin-bottom: 20px;">
                <input type="text" name="username" placeholder="Admin ID" required autocomplete="off"
                    style="width: 100%; padding: 10px; background: transparent; border: none; border-bottom: 1px solid white; color: white;">
            </div>
            <div class="user-box" style="margin-bottom: 30px;">
                <input type="password" name="password" placeholder="Password" required autocomplete="off"
                    style="width: 100%; padding: 10px; background: transparent; border: none; border-bottom: 1px solid white; color: white;">
            </div>

            <button type="submit" class="btn-submit"
                style="width: 100%; padding: 10px; background: var(--accent-color); border: none; border-radius: 5px; cursor: pointer; color: black; font-weight: bold;">Login</button>
        </form>
    </div>
</div>
{% endblock %}
