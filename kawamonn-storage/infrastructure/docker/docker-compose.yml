version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kawamonn_db
    environment:
      POSTGRES_USER: kawamonn
      POSTGRES_PASSWORD: adfe0e157ca01e32778cf141da132abc
      POSTGRES_DB: kawamonn_storage
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ../docs/schema.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - kawamonn-network

  redis:
    image: redis:7-alpine
    container_name: kawamonn_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: redis-server --appendonly yes
    networks:
      - kawamonn-network

  minio:
    image: minio/minio:latest
    container_name: kawamonn_minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: 52a20192abeed5ee60c77176cc742400
    volumes:
      - ./minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - kawamonn-network

  minio-init:
    image: minio/mc:latest
    container_name: kawamonn_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set kawamonn http://minio:9000 admin 52a20192abeed5ee60c77176cc742400;
      mc mb kawamonn/storage-bucket;
      mc anonymous set public kawamonn/storage-bucket;
      exit 0;
      "
    networks:
      - kawamonn-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: kawamonn_cloudflared
    network_mode: host
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=eyJhIjoiYWRiNmUzMzhjODliYTEwZmJmZmNhN2VmMTJiNzI1OWMiLCJ0IjoiMWM2NzU1ZDktNTM1MS00MmMzLWIwMjItYjVlMWE4ODc1MGNkIiwicyI6InBkNmxtdGs3Mms4OFhkcUMva2VHQ0E4Si9ScUpueUdwa2xzazI2d1poTVhPSHBiKy90ZXNvSjJDZVNVaUluQWxGazMrY2ZHVHdqbzFKUXdRN1dRRW9BPT0ifQ==
    restart: unless-stopped

  smtp-relay:
    image: mwader/postfix-relay
    container_name: kawamonn_smtp
    environment:
      - POSTFIX_myhostname=kawamonn.com
      - POSTFIX_inet_protocols=ipv4
      - OPENDKIM_DOMAINS=kawamonn.com
    ports:
      - "25:25"
    restart: unless-stopped
    networks:
      - kawamonn-network

networks:
  kawamonn-network:
    driver: bridge
